<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Urban Drip</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:Poppins;
  background:#000;
  color:#fff;
}

header {
  display:flex;
  justify-content:space-between;
  padding:20px;
  position:fixed;
  width:100%;
  background:#000;
  z-index:1000;
}

nav a {
  color:#fff;
  margin:0 10px;
  text-decoration:none;
}

.hero {
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:url('https://images.unsplash.com/photo-1520975922284-8b456906c813') center/cover;
  animation:fadeIn 2s;
}

.hero h1 {
  font-size:50px;
}

.btn {
  background:#fff;
  color:#000;
  padding:10px 20px;
  margin-top:20px;
  cursor:pointer;
}

.products {
  padding:60px 20px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

.card {
  background:#111;
  padding:10px;
  border-radius:10px;
  transition:0.3s;
}

.card:hover {
  transform:scale(1.05);
}

.cart {
  position:fixed;
  right:0;
  top:0;
  width:300px;
  height:100%;
  background:#111;
  padding:20px;
  overflow:auto;
}

footer {
  text-align:center;
  padding:30px;
}

@keyframes fadeIn {
  from {opacity:0;}
  to {opacity:1;}
}
</style>
</head>

<body>

<header>
  <h2>URBAN DRIP</h2>
  <nav>
    <a href="#">Home</a>
    <a href="#shop">Shop</a>
    <a href="#cart">Cart</a>
  </nav>
</header>

<section class="hero">
  <h1>OWN THE STREET</h1>
  <div class="btn" onclick="scrollToShop()">Shop Now</div>
</section>

<section id="shop" class="products">

<div class="card">
  <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab" width="100%">
  <h3>Oversized Tee</h3>
  <p>₹799</p>
  <button onclick="addToCart('Oversized Tee',799)">Add to Cart</button>
</div>

<div class="card">
  <img src="https://images.unsplash.com/photo-1503342217505-b0a15ec3261c" width="100%">
  <h3>Street Hoodie</h3>
  <p>₹1499</p>
  <button onclick="addToCart('Street Hoodie',1499)">Add to Cart</button>
</div>

</section>

<div class="cart" id="cart">
  <h2>🛒 Cart</h2>
  <ul id="cartItems"></ul>
  <h3 id="total">Total: ₹0</h3>
  <button onclick="checkout()">Checkout</button>
</div>

<section style="padding:50px;text-align:center;">
  <h2>📱 Instagram Reels</h2>
  <iframe src="https://www.instagram.com/reel/Cx/example/embed" width="300" height="400"></iframe>
</section>

<footer>
  <p>© 2026 Urban Drip</p>
</footer>

<script>
let cart = [];
let total = 0;

function addToCart(name, price){
  cart.push({name, price});
  total += price;
  displayCart();
}

function displayCart(){
  let list = document.getElementById("cartItems");
  list.innerHTML = "";
  cart.forEach(item=>{
    let li = document.createElement("li");
    li.innerText = item.name + " - ₹" + item.price;
    list.appendChild(li);
  });
  document.getElementById("total").innerText = "Total: ₹" + total;
}

function checkout(){
  alert("Proceeding to checkout (Integrate payment gateway)");
}

function scrollToShop(){
  document.getElementById("shop").scrollIntoView({behavior:'smooth'});
}
</script>

</body>
</html>
